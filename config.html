<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration Journal</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #ffffff;
  --bg-soft:     #f5f5f4;
  --bg-hover:    #efefed;
  --border:      #e8e8e6;
  --text:        #1a1a1a;
  --muted:       #8a8a88;
  --light:       #c4c4c2;
  --accent:      #e8a020;
  --accent-soft: #fef3dc;
  --radius:      10px;
}

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px;
  padding: 20px 22px; max-width: 460px;
}

h1 {
  font-family: 'Lora', serif; font-size: 15px; font-weight: 600;
  margin-bottom: 4px; color: var(--text);
}
.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--light); margin: 20px 0 8px;
  padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
.section-title:first-of-type { margin-top: 18px; }

.cf { margin-bottom: 12px; }
.cf label {
  display: block; font-size: 9.5px; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  font-family: 'DM Sans', sans-serif;
}
.cf input[type=text] {
  width: 100%; padding: 7px 10px; border: .5px solid var(--border);
  border-radius: var(--radius); font-size: 12.5px; color: var(--text);
  background: var(--bg); outline: none; font-family: inherit;
  transition: border-color .12s;
}
.cf input[type=text]:focus { border-color: var(--accent); }
.cf input[type=text]::placeholder { color: var(--light); }

.color-row { display: flex; align-items: center; gap: 8px; }
.color-row input[type=color] {
  width: 34px; height: 34px; border: .5px solid var(--border);
  border-radius: 8px; padding: 2px; cursor: pointer; background: var(--bg);
  flex-shrink: 0;
}
.color-row input[type=text] { font-family: monospace; }

.label-grid { display: flex; flex-direction: column; gap: 8px; }

.tog-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 11px; border: .5px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: background .12s; margin-bottom: 8px;
}
.tog-row:hover { background: var(--bg-soft); }
.tog-label { font-size: 12px; color: var(--text); }
.tog-sw {
  width: 26px; height: 15px; border-radius: 8px; background: var(--border);
  position: relative; transition: background .2s; flex-shrink: 0;
}
.tog-sw.on { background: var(--accent); }
.tog-sw::after {
  content: ''; position: absolute; width: 11px; height: 11px; border-radius: 50%;
  background: #fff; top: 2px; left: 2px; transition: transform .2s;
}
.tog-sw.on::after { transform: translateX(11px); }

.save-bar {
  display: flex; align-items: center; gap: 10px; margin-top: 22px;
  position: sticky; bottom: 0; background: var(--bg); padding-top: 6px;
}
.btn-save {
  padding: 8px 16px; border-radius: 999px; border: none;
  background: var(--accent); color: #fff; font-size: 12.5px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.btn-save:hover { opacity: .88; }
.save-ind {
  font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 5px;
  opacity: 0; transition: opacity .3s;
}
.save-ind.vis { opacity: 1; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: #27ae60; }

.hint { font-size: 10px; color: var(--light); margin-top: 4px; }
</style>
</head>
<body>

<h1>Configuration du Journal</h1>

<div class="cf">
  <label>Titre du document</label>
  <input type="text" id="cfgTitre" placeholder="Journal">
  <div class="hint">Affiché dans l'onglet du navigateur.</div>
</div>

<div class="cf">
  <label>Couleur d'accent</label>
  <div class="color-row">
    <input type="color" id="cfgAccentPicker" value="#e8a020">
    <input type="text" id="cfgAccentHex" placeholder="#e8a020">
  </div>
</div>

<div class="section-title">Onglets</div>

<div class="tog-row" onclick="toggleField('bujo_on')">
  <span class="tog-label">Bujo</span>
  <div class="tog-sw" id="tog-bujo_on"></div>
</div>
<div class="tog-row" onclick="toggleField('lectures_on')">
  <span class="tog-label">Lectures</span>
  <div class="tog-sw" id="tog-lectures_on"></div>
</div>
<div class="tog-row" onclick="toggleField('collections_on')">
  <span class="tog-label">Collections</span>
  <div class="tog-sw" id="tog-collections_on"></div>
</div>
<div class="hint" style="margin-bottom:14px">Activé = onglet visible dans le Journal.</div>

<div class="label-grid">
  <div class="cf">
    <label>Libellé onglet Bujo</label>
    <input type="text" id="cfgLabelBujo" placeholder="Bujo">
  </div>
  <div class="cf">
    <label>Libellé onglet Lectures</label>
    <input type="text" id="cfgLabelLectures" placeholder="Lectures">
  </div>
  <div class="cf">
    <label>Libellé onglet Collections</label>
    <input type="text" id="cfgLabelCollections" placeholder="Collections">
  </div>
</div>

<div class="section-title">Modules Bujo</div>

<div class="tog-row" onclick="toggleField('bday_on')">
  <span class="tog-label">Anniversaires</span>
  <div class="tog-sw" id="tog-bday_on"></div>
</div>
<div class="tog-row" onclick="toggleField('projet_on')">
  <span class="tog-label">Projets</span>
  <div class="tog-sw" id="tog-projet_on"></div>
</div>

<div class="section-title">Colonnes Bujo</div>

<div class="tog-row" onclick="toggleField('col_cal_on')">
  <span class="tog-label">Mini calendrier (sidebar)</span>
  <div class="tog-sw" id="tog-col_cal_on"></div>
</div>
<div class="tog-row" onclick="toggleField('col_futurelogs_on')">
  <span class="tog-label">Future logs (navigation mois/année)</span>
  <div class="tog-sw" id="tog-col_futurelogs_on"></div>
</div>
<div class="tog-row" onclick="toggleField('col_week_on')">
  <span class="tog-label">Agenda semaine (colonne droite)</span>
  <div class="tog-sw" id="tog-col_week_on"></div>
</div>

<div class="save-bar">
  <button class="btn-save" onclick="saveConfig()">Enregistrer</button>
  <div class="save-ind" id="saveInd"><div class="save-dot"></div> Sauvegardé</div>
</div>

<script>
'use strict';

// État local : clé -> valeur (toutes les valeurs sont des chaînes)
let config = {
  titre: '',
  accent: '#e8a020',
  bujo_on: 'true',
  lectures_on: 'true',
  collections_on: 'true',
  label_bujo: '',
  label_lectures: '',
  label_collections: '',
  bday_on: 'true',
  projet_on: 'true',
  col_cal_on: 'true',
  col_futurelogs_on: 'true',
  col_week_on: 'true'
};
// clé -> id de ligne Grist existante (pour update vs add)
let rowIds = {};
let saveT = null;

const TOGGLE_KEYS = ['bujo_on','lectures_on','collections_on','bday_on','projet_on','col_cal_on','col_futurelogs_on','col_week_on'];

function toggleField(key) {
  config[key] = (config[key] === 'false') ? 'true' : 'false';
  refreshToggles();
}

function refreshToggles() {
  TOGGLE_KEYS.forEach(key => {
    const el = document.getElementById('tog-' + key);
    if (el) el.classList.toggle('on', config[key] !== 'false');
  });
}

function refreshFields() {
  document.getElementById('cfgTitre').value = config.titre || '';
  document.getElementById('cfgLabelBujo').value = config.label_bujo || '';
  document.getElementById('cfgLabelLectures').value = config.label_lectures || '';
  document.getElementById('cfgLabelCollections').value = config.label_collections || '';
  const hex = config.accent || '#e8a020';
  document.getElementById('cfgAccentHex').value = hex;
  document.getElementById('cfgAccentPicker').value = /^#[0-9a-fA-F]{6}$/.test(hex) ? hex : '#e8a020';
  refreshToggles();
}

document.getElementById('cfgAccentPicker').addEventListener('input', e => {
  config.accent = e.target.value;
  document.getElementById('cfgAccentHex').value = e.target.value;
});
document.getElementById('cfgAccentHex').addEventListener('input', e => {
  let v = e.target.value.trim();
  if (v && !v.startsWith('#')) v = '#' + v;
  config.accent = v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('cfgAccentPicker').value = v;
});
document.getElementById('cfgTitre').addEventListener('input', e => { config.titre = e.target.value; });
document.getElementById('cfgLabelBujo').addEventListener('input', e => { config.label_bujo = e.target.value; });
document.getElementById('cfgLabelLectures').addEventListener('input', e => { config.label_lectures = e.target.value; });
document.getElementById('cfgLabelCollections').addEventListener('input', e => { config.label_collections = e.target.value; });

async function loadConfig() {
  if (typeof grist === 'undefined') { refreshFields(); return; }
  try {
    const raw = await grist.docApi.fetchTable('Config');
    rowIds = {};
    (raw.id || []).forEach((id, i) => {
      const cle = String(raw.cle?.[i] || '');
      if (!cle) return;
      config[cle] = String(raw.valeur?.[i] ?? '');
      rowIds[cle] = id;
    });
  } catch (e) {
    console.warn('Config: table introuvable ou vide —', e);
  }
  refreshFields();
}

async function saveConfig() {
  if (typeof grist === 'undefined') { flashSaved(); return; }
  const actions = [];
  Object.keys(config).forEach(cle => {
    const valeur = String(config[cle] ?? '');
    if (rowIds[cle] !== undefined) {
      actions.push(['UpdateRecord', 'Config', rowIds[cle], { cle, valeur }]);
    } else {
      actions.push(['AddRecord', 'Config', null, { cle, valeur }]);
    }
  });
  try {
    await grist.docApi.applyUserActions(actions);
    await loadConfig(); // recharge les ids pour les nouvelles lignes
    flashSaved();
  } catch (e) {
    alert('Erreur lors de l\'enregistrement : ' + e.message);
  }
}

function flashSaved() {
  const ind = document.getElementById('saveInd');
  ind.classList.add('vis');
  clearTimeout(saveT);
  saveT = setTimeout(() => ind.classList.remove('vis'), 2200);
}

if (typeof grist !== 'undefined') {
  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'cle',    title: 'Clé',    type: 'Text' },
      { name: 'valeur', title: 'Valeur', type: 'Text' }
    ]
  });
  loadConfig();
} else {
  refreshFields();
}
</script>
</body>
</html>
